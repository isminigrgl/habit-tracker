name: Habit Tracker CI Pipeline

on:
  push:
    branches:
      - main
      - architecture
      - frontend
      - backend
      - integration-testing
      - documentation
  pull_request:
    branches:
      - main

jobs:
  build-test-lint:
    name: Build, Test and Lint Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run automated tests
        run: npm test

      - name: Build frontend application
        run: npm run build

      - name: Verify backend server file exists
        run: test -f server.js

      - name: Build Docker image
        run: docker build -t habit-tracker .
